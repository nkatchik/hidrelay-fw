name: Firmware CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            gcc \
            git \
            jq \
            make \
            tar \
            unzip \
            xz-utils

      - name: Cache bootstrap artifacts
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-bootstrap-${{ hashFiles('cmake/*.cmake', 'platform/*/*.cmake', 'platform/*/cmake/*.cmake', 'platform/*/toolchain.cmake.in') }}
          restore-keys: |
            ${{ runner.os }}-bootstrap-

      - name: Run CI
        env:
          APP_SKIP_GIT_HOOKS_BOOTSTRAP: "1"
        run: make ci
